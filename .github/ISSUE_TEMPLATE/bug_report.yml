name: Bug report
description: Report a reproducible problem in navi-di.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share a minimal reproduction or exact steps.
      placeholder: |
        1. Install ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node version, Bun version if relevant, TypeScript version, module system, and decorator configuration.
      placeholder: |
        node: 22.x
        bun: 1.3.x
        typescript: 5.9.x
        module: esm
        decorators: standard stage 3
    validations:
      required: true
